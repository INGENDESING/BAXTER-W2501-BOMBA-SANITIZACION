services:
  - type: web
    name: 2025bc-estudio-web
    runtime: node
    repo: https://github.com/INGENDESING/BAXTER-W2501-BOMBA-SANITIZACION.git
    branch: main
    buildCommand: npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
